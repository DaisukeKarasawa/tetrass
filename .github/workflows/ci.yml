name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Artifact-level checks (strict board match)
        run: npx vitest run src/verify/svgFinalStateMatcher.test.ts src/generateRunner.integration.test.ts
      - run: git diff --exit-code action/index.mjs
