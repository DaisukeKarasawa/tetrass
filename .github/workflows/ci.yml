name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: git diff --exit-code action/index.mjs

  # Single check name for branch protection: require "CI / CI required" on `main`.
  required:
    name: CI required
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - run: echo "CI passed"
