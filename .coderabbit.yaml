language: "ja-JP"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false

  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true

  # Reduce review noise from generated artifacts and dependencies.
  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!img/**/*.svg"
    - "!action/index.mjs"
    - "!package-lock.json"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.webp"

  path_instructions:
    - path: "src/generateRunner.ts"
      instructions: |
        Shared Action/CLI core. Prioritize:
        - Deterministic output: same contribution input → same SVG
        - Correct 53×7 mapping and nine-band (6×8 + 5) drop timeline
        - Output path safety for user-supplied `outputs`
        - No token/auth leakage in logs/errors
        Prefer correctness and safety over style nits.

    - path: "src/action-entry.ts"
      instructions: |
        Validate GitHub Action input handling:
        - Required env parsing (`INPUT_GITHUB_USER_NAME`, `INPUT_OUTPUTS`)
        - Safe workspace-root assumptions
        - Actionable errors without secret leakage.

    - path: "src/io/**/*.ts"
      instructions: |
        Review GitHub GraphQL and fallback behavior for:
        - Auth handling and fallback correctness
        - Safe error content (no token/header exposure)
        - Stable behavior under rate limits and empty data.

    - path: "src/grass/**/*.ts"
      instructions: |
        Column-band splitting and drop scheduling. Check:
        - Bands sum to 53 columns and match 6+6+6+6+6+6+6+6+5
        - Sequential left-to-right timing is preserved
        - No duplicate or dropped cells when partitioning grass cells

    - path: "src/renderer/**/*.ts"
      instructions: |
        SVG output and SMIL animation. Check:
        - GitHub-like cell geometry (squares, gaps, rx) and level colors
        - Safe embedding of palette strings (no attribute injection)
        - Animation loops without breaking final settled appearance

    - path: "action/action.yml"
      instructions: |
        Treat as public contract. Any input/schema behavior change must be mirrored in
        README usage and sample workflow.

    - path: ".github/workflows/**/*.yml"
      instructions: |
        Check workflow reliability:
        - Still invokes intended action contract
        - Required inputs are supplied
        - No insecure token misuse.

    - path: "README.md"
      instructions: |
        This repo is consumed as a reusable action.
        Verify usage snippet, input table, branch/tag pin advice, and output query examples
        match action/action.yml and parser behavior.

  pre_merge_checks:
    title:
      mode: "warning"
      requirements: "Start with an imperative verb; prefer <= 80 characters."
    description:
      mode: "warning"
    issue_assessment:
      mode: "warning"
    docstrings:
      mode: "off"

    override_requested_reviewers_only: true

    custom_checks:
      - name: "Action bundle sync"
        mode: "warning"
        instructions: |
          Pass if either:
          (A) PR does not modify runtime sources affecting action execution
              (src/action-entry.ts, src/generateRunner.ts, src/io/**, src/grass/**,
               src/renderer/**, src/domain/**, action/action.yml, package.json build scripts),
          or
          (B) action/index.mjs is modified in the same PR.
          Fail otherwise.

      - name: "Action contract docs sync"
        mode: "warning"
        instructions: |
          Contract location (mandatory): The GitHub Action manifest is **action/action.yml**
          (composite action in subdirectory). There is **no** action.yml at the repository root
          by design. **Never** mark this check Inconclusive solely because ./action.yml or
          ./action.yaml is missing at the root; always read **action/action.yml** for the
          inputs/outputs contract.

          Step 1 — Scope: If the PR does not modify action/action.yml, README.md, or
          src/generateRunner.ts (outputs / parseOutputLines semantics), **Pass** with reason
          "N/A: action contract and docs paths unchanged."

          Step 2 — When action/action.yml or relevant generator output parsing changes: verify
          README usage snippet and Inputs section match the manifest. **Fail** if README is
          stale; **Pass** when consistent.

      - name: "Output path boundary guard"
        mode: "warning"
        instructions: |
          Step 1 — Scope: Use the PR changed-files list (or equivalent diff summary). If
          neither src/generateRunner.ts nor src/action-entry.ts appears in the changed paths,
          the result is **Pass** with reason "N/A: output-path logic files unchanged." Do not
          leave this check inconclusive when both paths are absent from the change set.

          Step 2 — Only when at least one of those files is modified: verify user-provided
          output paths cannot resolve outside GITHUB_WORKSPACE without explicit rejection
          logic. Fail if that risk exists; Pass if boundary checks are present or clearly
          unchanged in a safe way.

      - name: "Determinism invariants evidence"
        mode: "warning"
        instructions: |
          Apply when PR changes src/grass/**, src/renderer/**, src/io/contributions.ts, or src/domain/grass.ts.
          Pass only if PR includes tests or explicit PR-description evidence for:
          - stable mapping from API contributionLevel to rendered cells
          - stable nine-band drop schedule for the same input
          Fail otherwise.

      - name: "Workflow-action contract wiring"
        mode: "warning"
        instructions: |
          Apply when .github/workflows/generate-tetrass.yml changes.
          Pass if generation step still uses the expected action contract and supplies required
          inputs: github_user_name and outputs.
          Fail otherwise.
