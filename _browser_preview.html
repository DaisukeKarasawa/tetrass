<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tetrass SVG preview</title>
  <style>
    body { margin: 16px; font-family: system-ui, sans-serif; background: #f6f8fa; color: #24292f; }
    h1 { font-size: 1rem; font-weight: 600; margin: 0 0 12px; }
    figure { margin: 0 0 24px; padding: 12px; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; }
    figcaption { font-size: 0.85rem; margin-bottom: 8px; color: #57606a; }
    img { display: block; max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <h1>Tetrass contribution graph (local <code>img/</code>)</h1>
  <figure>
    <figcaption>Light (<code>tetrass.svg</code>)</figcaption>
    <img src="img/tetrass.svg" width="1064" height="144" intrinsicsize="1064 x 144" alt="Tetrass light contribution graph" />
  </figure>
  <figure>
    <figcaption>Dark (<code>tetrass-dark.svg</code>)</figcaption>
    <img src="img/tetrass-dark.svg" width="1064" height="144" intrinsicsize="1064 x 144" alt="Tetrass dark contribution graph" />
  </figure>
</body>
</html>
